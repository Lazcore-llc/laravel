name: Deploy Laravel App to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Laravel to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}

            echo "Pulling latest code from deploy branch..."
            git fetch origin
            git checkout deploy
            git pull origin deploy

            echo "Building and starting containers..."
            sudo docker compose up -d --build

            echo "Generating Laravel application key & Running migration and seeder..."
            sudo docker exec laravel-app php artisan key:generate --force
            sudo docker exec laravel-app php artisan migrate --seed --force

            echo "Deployment completed successfully!"
